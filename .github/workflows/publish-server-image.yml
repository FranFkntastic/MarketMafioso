name: Publish MarketMafioso Server Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to publish'
        required: false
        default: 'dev'

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-marketmafioso-server-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image tags
        id: tags
        shell: bash
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/$owner/marketmafioso-server"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.image_tag }}"
          fi

          tags="$image:$version"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags="$tags,$image:latest"
          fi

          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package self-host release bundle
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          mkdir -p dist
          archive="dist/marketmafioso-self-host-${GITHUB_REF_NAME}.zip"
          (cd release/self-host && zip -r "../../$archive" .)

      - name: Attach self-host bundle to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          body_path: release/self-host/docs/INSTALLATION-NOTE.md
          files: dist/marketmafioso-self-host-${{ github.ref_name }}.zip
