name: Deploy MarketMafioso Dev Receiver to VPS

on:
  push:
    branches: [ local-dev ]
    paths:
      - 'src/MarketMafioso.Dashboard/**'
      - 'src/MarketMafioso.Server/**'
      - 'tests/MarketMafioso.Server.Tests/**'
      - 'MarketMafioso.sln'
      - 'eng/craft-architect-core.ref'
      - 'eng/franthropy.ref'
      - '.github/workflows/deploy-vps-marketmafioso-dev.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vps-marketmafioso-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
      MARKETMAFIOSO_DEV_INGEST_API_KEY: ${{ secrets.MARKETMAFIOSO_DEV_INGEST_API_KEY }}
      MARKETMAFIOSO_DEV_PREVIOUS_INGEST_API_KEY: ${{ secrets.MARKETMAFIOSO_DEV_PREVIOUS_INGEST_API_KEY }}
      MARKETMAFIOSO_DEV_BASIC_AUTH_PASSWORD: ${{ secrets.MARKETMAFIOSO_DEV_BASIC_AUTH_PASSWORD }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Read pinned Craft Architect Core revision
        id: craft-architect-ref
        shell: bash
        run: echo "ref=$(tr -d '[:space:]' < eng/craft-architect-core.ref)" >> "$GITHUB_OUTPUT"

      - name: Checkout Craft Architect Core
        uses: actions/checkout@v4
        with:
          repository: FranFkntastic/XIV-Craft-Architect
          path: craft-architect
          ref: ${{ steps.craft-architect-ref.outputs.ref }}

      - name: Read pinned Franthropy revision
        id: franthropy-ref
        shell: bash
        run: echo "ref=$(tr -d '[:space:]' < eng/franthropy.ref)" >> "$GITHUB_OUTPUT"

      - name: Checkout Franthropy
        uses: actions/checkout@v4
        with:
          repository: FranFkntastic/Franthropy
          path: franthropy
          ref: ${{ steps.franthropy-ref.outputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish receiver
        run: >
          dotnet publish "src/MarketMafioso.Server/MarketMafioso.Server.csproj"
          -c Release
          -r linux-x64
          --self-contained true
          -p:CraftArchitectCoreProject="${GITHUB_WORKSPACE}/craft-architect/src/FFXIV Craft Architect.Core/FFXIV Craft Architect.Core.csproj"
          -p:FranthropyFfxivProject="${GITHUB_WORKSPACE}/franthropy/src/Franthropy.FFXIV/Franthropy.FFXIV.csproj"
          -p:FranthropyFilteringProject="${GITHUB_WORKSPACE}/franthropy/src/Franthropy.Filtering/Franthropy.Filtering.csproj"
          -o dist/marketmafioso-server

      - name: Package receiver files
        id: package
        shell: bash
        run: |
          release="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA::7}"
          archive="marketmafioso-dev-$release.tar.gz"
          tar -czf "$archive" -C dist/marketmafioso-server .
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Write runtime environment
        id: runtime
        shell: bash
        run: |
          test -n "$MARKETMAFIOSO_DEV_INGEST_API_KEY"
          test -n "$MARKETMAFIOSO_DEV_BASIC_AUTH_PASSWORD"
          cat > marketmafioso-dev.env <<ENV
          ASPNETCORE_URLS=http://127.0.0.1:5088
          MarketMafioso__RequireApiKey=true
          MarketMafioso__ClientApiKey=$MARKETMAFIOSO_DEV_INGEST_API_KEY
          MarketMafioso__PreviousClientApiKey=$MARKETMAFIOSO_DEV_PREVIOUS_INGEST_API_KEY
          MarketMafioso__BasePath=/marketmafioso
          MarketMafioso__PublicOrigin=https://dev.xivcraftarchitect.com
          MarketMafioso__StorageLabel=dev receiver storage
          MarketMafioso__EnableMarketAcquisition=true
          MarketMafioso__AllowedOrigins__0=https://dev.xivcraftarchitect.com
          MarketMafioso__AllowedOrigins__1=https://xivcraftarchitect.com
          MarketMafioso__AcquisitionExecutionLeaseSeconds=900
          MarketMafioso__AcquisitionRecoveryPickupExpirySeconds=3600
          MarketMafioso__DatabasePath=/srv/craftarchitect/data/marketmafioso/dev/marketmafioso.db
          MarketMafioso__RawJsonRetentionCount=20
          MarketMafioso__SnapshotRetentionCount=500
          MarketMafioso__RequireDashboardAuth=true
          MarketMafioso__DashboardBootstrapUsername=marketmafioso
          MarketMafioso__DashboardBootstrapPassword=$MARKETMAFIOSO_DEV_BASIC_AUTH_PASSWORD
          ENV
          chmod 600 marketmafioso-dev.env
          cat > marketmafioso-dev.caddy <<CADDY
          @retired_marketmafioso path /api/marketmafioso /api/marketmafioso/*
          handle @retired_marketmafioso {
              respond "The MarketMafioso hosted route moved to /marketmafioso/." 410
          }

          handle /marketmafioso {
              reverse_proxy 127.0.0.1:5088
          }

          handle /marketmafioso/* {
              reverse_proxy 127.0.0.1:5088
          }
          CADDY

      - name: Write remote deploy script
        shell: bash
        run: |
          cat > deploy-marketmafioso-dev-remote.sh <<'REMOTE'
          set -euo pipefail

          release="$1"
          remote_tmp="$2"
          archive="$remote_tmp/marketmafioso-dev-$release.tar.gz"
          env_file="$remote_tmp/marketmafioso-dev.env"
          caddy_file="$remote_tmp/marketmafioso-dev.caddy"
          service_name="marketmafioso-dev"
          root="/srv/craftarchitect/services/marketmafioso/dev"
          data_root="/srv/craftarchitect/data/marketmafioso/dev"
          release_dir="$root/releases/$release"
          executable="$release_dir/MarketMafioso.Server"
          caddy_target="/etc/caddy/conf.d/dev.xivcraftarchitect.com/marketmafioso.caddy"
          rollback_env="$root/marketmafioso-dev.env.rollback"
          rollback_caddy="$root/marketmafioso-dev.caddy.rollback"
          previous_release="$(readlink -f "$root/current" 2>/dev/null || true)"

          rollback() {
            set +e
            echo "Activation failed; restoring the previous MarketMafioso release."
            if [[ -n "$previous_release" && -d "$previous_release" ]]; then
              sudo ln -sfn "$previous_release" "$root/current"
            fi
            if [[ -f "$rollback_env" ]]; then
              sudo cp -p "$rollback_env" "$root/marketmafioso-dev.env"
            fi
            if [[ -f "$rollback_caddy" ]]; then
              sudo install -m 644 -o root -g root "$rollback_caddy" "$caddy_target"
            else
              sudo rm -f "$caddy_target"
            fi
            sudo systemctl daemon-reload
            sudo systemctl restart "$service_name"
            sudo caddy validate --config /etc/caddy/Caddyfile && sudo systemctl reload caddy
          }

          finish() {
            status=$?
            if [[ "$status" != "0" ]]; then
              rollback
            fi
            rm -rf "$remote_tmp"
            exit "$status"
          }
          trap finish EXIT

          sudo mkdir -p "$release_dir" "$data_root"
          sudo tar -xzf "$archive" -C "$release_dir"
          sudo chown -R "$USER:$USER" "$release_dir" "$data_root"
          sudo chmod +x "$executable"

          if [[ -f "$root/marketmafioso-dev.env" ]]; then
            sudo cp -p "$root/marketmafioso-dev.env" "$rollback_env"
          else
            sudo rm -f "$rollback_env"
          fi
          if [[ -f "$caddy_target" ]]; then
            sudo cp -p "$caddy_target" "$rollback_caddy"
          else
            sudo rm -f "$rollback_caddy"
          fi
          if [[ -n "$previous_release" && -d "$previous_release" ]]; then
            sudo ln -sfn "$previous_release" "$root/previous"
          fi

          sudo install -m 600 -o "$USER" -g "$USER" "$env_file" "$root/marketmafioso-dev.env"

          sudo tee "/etc/systemd/system/$service_name.service" > /dev/null <<SERVICE
          [Unit]
          Description=MarketMafioso dev receiver
          After=network.target

          [Service]
          WorkingDirectory=$root/current
          ExecStart=$root/current/MarketMafioso.Server
          EnvironmentFile=$root/marketmafioso-dev.env
          Restart=always
          RestartSec=5
          User=$USER

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo ln -sfn "$release_dir" "$root/current"
          sudo systemctl daemon-reload
          sudo systemctl enable "$service_name"
          sudo systemctl restart "$service_name"
          systemctl is-active "$service_name"

          sudo mkdir -p /etc/caddy/conf.d/dev.xivcraftarchitect.com
          sudo install -m 644 -o root -g root "$caddy_file" "$caddy_target"

          sudo python3 - <<'PY'
          from pathlib import Path

          caddyfile = Path("/etc/caddy/Caddyfile")
          text = caddyfile.read_text()
          marker = "dev.xivcraftarchitect.com {\n"
          import_line = "\timport /etc/caddy/conf.d/dev.xivcraftarchitect.com/*.caddy"
          text = text.replace(import_line + "\n\n", "").replace(import_line + "\n", "")
          index = text.find(marker)
          if index < 0:
              raise SystemExit("Could not find dev.xivcraftarchitect.com site block")
          index += len(marker)
          caddyfile.write_text(text[:index] + import_line + "\n\n" + text[index:])
          PY

          sudo caddy validate --config /etc/caddy/Caddyfile
          sudo -u caddy caddy adapt --config /etc/caddy/Caddyfile > /dev/null
          sudo systemctl reload caddy

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:5088/health > /dev/null; then
              break
            fi

            if [[ "$attempt" == "30" ]]; then
              journalctl -u "$service_name" --no-pager -n 80
              exit 1
            fi

            sleep 1
          done

          sudo find "$root/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' |
            sort -rn |
            tail -n +6 |
            cut -d' ' -f2- |
            sudo xargs -r rm -rf
          REMOTE

      - name: Configure SSH
        shell: bash
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"
          test -n "$VPS_SSH_PORT"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/craftarchitect_vps
          chmod 600 ~/.ssh/craftarchitect_vps
          ssh-keyscan -p "$VPS_SSH_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Create remote temp directory
        id: remote-temp
        shell: bash
        run: |
          remote_tmp="$(ssh -p "$VPS_SSH_PORT" -i ~/.ssh/craftarchitect_vps "$VPS_USER@$VPS_HOST" 'tmp=$(mktemp -d /tmp/marketmafioso-dev.XXXXXX); chmod 700 "$tmp"; printf "%s" "$tmp"')"
          test -n "$remote_tmp"
          echo "path=$remote_tmp" >> "$GITHUB_OUTPUT"

      - name: Upload receiver archive and deploy script
        run: >
          scp -P "$VPS_SSH_PORT"
          -i ~/.ssh/craftarchitect_vps
          "${{ steps.package.outputs.archive }}"
          marketmafioso-dev.env
          marketmafioso-dev.caddy
          deploy-marketmafioso-dev-remote.sh
          "$VPS_USER@$VPS_HOST:${{ steps.remote-temp.outputs.path }}/"

      - name: Activate receiver release
        id: activate
        run: >
          ssh -p "$VPS_SSH_PORT"
          -i ~/.ssh/craftarchitect_vps
          "$VPS_USER@$VPS_HOST"
          "bash '${{ steps.remote-temp.outputs.path }}/deploy-marketmafioso-dev-remote.sh' '${{ steps.package.outputs.release }}' '${{ steps.remote-temp.outputs.path }}'"

      - name: Verify public receiver routes
        shell: bash
        run: |
          expect_status() {
            local name="$1"
            local actual="$2"
            shift 2
            echo "$name returned HTTP $actual"
            for expected in "$@"; do
              if [ "$actual" = "$expected" ]; then
                return 0
              fi
            done
            echo "::error::$name returned HTTP $actual; expected one of: $*"
            return 1
          }

          health_ok=false
          for attempt in {1..20}; do
            if curl --fail --silent --show-error "https://dev.xivcraftarchitect.com/marketmafioso/health" > /dev/null; then
              health_ok=true
              break
            fi
            echo "Health check not ready on attempt $attempt; retrying..."
            sleep 2
          done
          test "$health_ok" = "true"

          dashboard_status="$(curl --silent --output /dev/null --write-out '%{http_code}' "https://dev.xivcraftarchitect.com/marketmafioso/")"
          expect_status dashboard "$dashboard_status" 200

          dashboard_no_slash_status="$(curl --silent --output /dev/null --write-out '%{http_code}' "https://dev.xivcraftarchitect.com/marketmafioso")"
          expect_status dashboard-no-slash "$dashboard_no_slash_status" 200 308 301

          curl --fail --silent --show-error \
            "https://dev.xivcraftarchitect.com/marketmafioso/" | grep -F "MarketMafioso" > /dev/null
          curl --fail --silent --show-error \
            "https://dev.xivcraftarchitect.com/marketmafioso/" | grep -F "_framework/blazor" > /dev/null

          acquisition_page_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/marketmafioso/acquisition")"
          expect_status acquisition-page "$acquisition_page_status" 200

          api_without_session="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/acquisition/requests")"
          expect_status acquisition-api-without-session "$api_without_session" 401

          cookie_jar="$(mktemp)"
          login_body="$(python3 -c 'import json, os; print(json.dumps({"username": "marketmafioso", "password": os.environ["MARKETMAFIOSO_DEV_BASIC_AUTH_PASSWORD"]}))')"
          login_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --cookie-jar "$cookie_jar" \
            --header 'Content-Type: application/json' \
            --data "$login_body" \
            "https://dev.xivcraftarchitect.com/marketmafioso/auth/login")"
          expect_status dashboard-login "$login_status" 200

          api_with_session="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --cookie "$cookie_jar" \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/acquisition/requests")"
          expect_status acquisition-api-with-session "$api_with_session" 200

          inventory_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/marketmafioso/inventory")"
          expect_status inventory-page "$inventory_status" 200

          inventory_api_without_session="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/inventory")"
          expect_status inventory-api-without-session "$inventory_api_without_session" 401 405

          settings_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/marketmafioso/settings")"
          expect_status settings-page "$settings_status" 200

          diagnostics_with_session="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --cookie "$cookie_jar" \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/diagnostics/events?limit=1")"
          expect_status diagnostics-with-session "$diagnostics_with_session" 200

          timeline_with_session="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --cookie "$cookie_jar" \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/acquisition/requests/smoke-missing/timeline")"
          expect_status timeline-with-dashboard-session "$timeline_with_session" 404

          acquisition_without_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/acquisition/requests/pending?characterName=Smoke&world=Gilgamesh")"
          expect_status acquisition-pending-without-key "$acquisition_without_key" 401

          acquisition_with_client_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "X-Api-Key: $MARKETMAFIOSO_DEV_INGEST_API_KEY" \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/acquisition/requests/pending?characterName=Smoke&world=Gilgamesh")"
          expect_status acquisition-pending-with-key "$acquisition_with_client_key" 200

          ingest_without_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header 'Content-Type: application/json' \
            --data-binary @docs/samples/inventory-report.sample.json \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/inventory")"
          expect_status ingest-without-key "$ingest_without_key" 401

          ingest_with_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header "X-Api-Key: $MARKETMAFIOSO_DEV_INGEST_API_KEY" \
            --header 'Content-Type: application/json' \
            --data '{}' \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/inventory")"
          expect_status ingest-with-key "$ingest_with_key" 400

          read_with_client_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "X-Api-Key: $MARKETMAFIOSO_DEV_INGEST_API_KEY" \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/reports")"
          expect_status read-with-key "$read_with_client_key" 200

          capabilities_without_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/capabilities")"
          expect_status capabilities-without-key "$capabilities_without_key" 401

          capabilities_body="$(curl --fail --silent --show-error \
            --header "X-Api-Key: $MARKETMAFIOSO_DEV_INGEST_API_KEY" \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/capabilities")"
          printf '%s' "$capabilities_body" | grep -F "craft.appraise" > /dev/null

          check_cors_preflight() {
            local origin="$1"
            local headers
            headers="$(curl --silent --show-error --dump-header - --output /dev/null \
              --request OPTIONS \
              --header "Origin: $origin" \
              --header 'Access-Control-Request-Method: GET' \
              --header 'Access-Control-Request-Headers: X-Api-Key' \
              "https://dev.xivcraftarchitect.com/marketmafioso/api/capabilities")"
            printf '%s' "$headers" | tr -d '\r' | grep -i -F "access-control-allow-origin: $origin" > /dev/null
            printf '%s' "$headers" | tr -d '\r' | grep -i -F 'access-control-allow-headers:' | grep -i -F 'x-api-key' > /dev/null
          }

          check_cors_preflight "https://dev.xivcraftarchitect.com"
          check_cors_preflight "https://xivcraftarchitect.com"

          quote_without_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header 'Content-Type: application/json' \
            --data '{}' \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/craft/appraise")"
          expect_status quote-without-key "$quote_without_key" 401

          quote_invalid_schema="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header "X-Api-Key: $MARKETMAFIOSO_DEV_INGEST_API_KEY" \
            --header 'Content-Type: application/json' \
            --data '{"schemaVersion":2,"itemId":2,"itemName":"Fire Shard","quantity":1}' \
            "https://dev.xivcraftarchitect.com/marketmafioso/api/craft/appraise")"
          expect_status quote-invalid-schema "$quote_invalid_schema" 400

          retired_dashboard_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/")"
          echo "retired-dashboard returned HTTP $retired_dashboard_status"
          test "$retired_dashboard_status" != "200"

          retired_plugin_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "X-Api-Key: $MARKETMAFIOSO_DEV_INGEST_API_KEY" \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/acquisition/requests/pending?characterName=Smoke&world=Gilgamesh")"
          echo "retired-plugin returned HTTP $retired_plugin_status"
          test "$retired_plugin_status" != "200"

      - name: Roll back failed public receiver verification
        if: ${{ failure() && steps.activate.outcome == 'success' }}
        shell: bash
        run: |
          ssh -p "$VPS_SSH_PORT" -i ~/.ssh/craftarchitect_vps "$VPS_USER@$VPS_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          service_name="marketmafioso-dev"
          root="/srv/craftarchitect/services/marketmafioso/dev"
          caddy_target="/etc/caddy/conf.d/dev.xivcraftarchitect.com/marketmafioso.caddy"
          previous_release="$(readlink -f "$root/previous" 2>/dev/null || true)"
          test -n "$previous_release"
          test -d "$previous_release"
          sudo ln -sfn "$previous_release" "$root/current"
          if [[ -f "$root/marketmafioso-dev.env.rollback" ]]; then
            sudo cp -p "$root/marketmafioso-dev.env.rollback" "$root/marketmafioso-dev.env"
          fi
          if [[ -f "$root/marketmafioso-dev.caddy.rollback" ]]; then
            sudo install -m 644 -o root -g root "$root/marketmafioso-dev.caddy.rollback" "$caddy_target"
          fi
          sudo systemctl daemon-reload
          sudo systemctl restart "$service_name"
          sudo caddy validate --config /etc/caddy/Caddyfile
          sudo systemctl reload caddy
          curl --fail --silent --show-error http://127.0.0.1:5088/health > /dev/null
          REMOTE
