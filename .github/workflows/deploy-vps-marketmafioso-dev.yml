name: Deploy MarketMafioso Dev Receiver to VPS

on:
  push:
    branches: [ local-dev ]
    paths:
      - 'MarketMafioso.Dashboard/**'
      - 'MarketMafioso.Server/**'
      - 'MarketMafioso.Server.Tests/**'
      - 'MarketMafioso.sln'
      - '.github/workflows/deploy-vps-marketmafioso-dev.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vps-marketmafioso-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
      MARKETMAFIOSO_DEV_INGEST_API_KEY: ${{ secrets.MARKETMAFIOSO_DEV_INGEST_API_KEY }}
      MARKETMAFIOSO_DEV_PREVIOUS_INGEST_API_KEY: ${{ secrets.MARKETMAFIOSO_DEV_PREVIOUS_INGEST_API_KEY }}
      MARKETMAFIOSO_DEV_BASIC_AUTH_PASSWORD: ${{ secrets.MARKETMAFIOSO_DEV_BASIC_AUTH_PASSWORD }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish receiver
        run: >
          dotnet publish "MarketMafioso.Server/MarketMafioso.Server.csproj"
          -c Release
          -r linux-x64
          --self-contained true
          -o dist/marketmafioso-server

      - name: Package receiver files
        id: package
        shell: bash
        run: |
          release="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA::7}"
          archive="marketmafioso-dev-$release.tar.gz"
          tar -czf "$archive" -C dist/marketmafioso-server .
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Write runtime environment
        id: runtime
        shell: bash
        run: |
          test -n "$MARKETMAFIOSO_DEV_INGEST_API_KEY"
          test -n "$MARKETMAFIOSO_DEV_BASIC_AUTH_PASSWORD"
          cat > marketmafioso-dev.env <<ENV
          ASPNETCORE_URLS=http://127.0.0.1:5088
          MarketMafioso__RequireApiKey=true
          MarketMafioso__ClientApiKey=$MARKETMAFIOSO_DEV_INGEST_API_KEY
          MarketMafioso__PreviousClientApiKey=$MARKETMAFIOSO_DEV_PREVIOUS_INGEST_API_KEY
          MarketMafioso__BasePath=/api/marketmafioso
          MarketMafioso__PublicOrigin=https://dev.xivcraftarchitect.com
          MarketMafioso__StorageLabel=dev receiver storage
          MarketMafioso__DatabasePath=/srv/craftarchitect/data/marketmafioso/dev/marketmafioso.db
          MarketMafioso__RawJsonRetentionCount=20
          MarketMafioso__SnapshotRetentionCount=500
          MarketMafioso__RequireDashboardAuth=true
          MarketMafioso__DashboardBootstrapUsername=marketmafioso
          MarketMafioso__DashboardBootstrapPassword=$MARKETMAFIOSO_DEV_BASIC_AUTH_PASSWORD
          ENV
          chmod 600 marketmafioso-dev.env
          cat > marketmafioso-dev.caddy <<CADDY
          @marketmafioso {
              path /api/marketmafioso /api/marketmafioso/*
          }

          handle @marketmafioso {
              reverse_proxy 127.0.0.1:5088
          }
          CADDY

      - name: Write remote deploy script
        shell: bash
        run: |
          cat > deploy-marketmafioso-dev-remote.sh <<'REMOTE'
          set -euo pipefail

          release="$1"
          remote_tmp="$2"
          archive="$remote_tmp/marketmafioso-dev-$release.tar.gz"
          env_file="$remote_tmp/marketmafioso-dev.env"
          caddy_file="$remote_tmp/marketmafioso-dev.caddy"
          service_name="marketmafioso-dev"
          root="/srv/craftarchitect/services/marketmafioso/dev"
          data_root="/srv/craftarchitect/data/marketmafioso/dev"
          release_dir="$root/releases/$release"
          executable="$release_dir/MarketMafioso.Server"
          trap 'rm -rf "$remote_tmp"' EXIT

          sudo mkdir -p "$release_dir" "$data_root"
          sudo tar -xzf "$archive" -C "$release_dir"
          sudo chown -R "$USER:$USER" "$release_dir" "$data_root"
          sudo chmod +x "$executable"

          sudo install -m 600 -o "$USER" -g "$USER" "$env_file" "$root/marketmafioso-dev.env"

          sudo tee "/etc/systemd/system/$service_name.service" > /dev/null <<SERVICE
          [Unit]
          Description=MarketMafioso dev receiver
          After=network.target

          [Service]
          WorkingDirectory=$data_root
          ExecStart=$root/current/MarketMafioso.Server
          EnvironmentFile=$root/marketmafioso-dev.env
          Restart=always
          RestartSec=5
          User=$USER

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo ln -sfn "$release_dir" "$root/current"
          sudo systemctl daemon-reload
          sudo systemctl enable "$service_name"
          sudo systemctl restart "$service_name"
          systemctl is-active "$service_name"

          sudo mkdir -p /etc/caddy/conf.d/dev.xivcraftarchitect.com
          sudo install -m 644 -o root -g root "$caddy_file" /etc/caddy/conf.d/dev.xivcraftarchitect.com/marketmafioso.caddy

          sudo python3 - <<'PY'
          from pathlib import Path

          caddyfile = Path("/etc/caddy/Caddyfile")
          text = caddyfile.read_text()
          marker = "dev.xivcraftarchitect.com {\n"
          import_line = "\timport /etc/caddy/conf.d/dev.xivcraftarchitect.com/*.caddy"
          text = text.replace(import_line + "\n\n", "").replace(import_line + "\n", "")
          index = text.find(marker)
          if index < 0:
              raise SystemExit("Could not find dev.xivcraftarchitect.com site block")
          index += len(marker)
          caddyfile.write_text(text[:index] + import_line + "\n\n" + text[index:])
          PY

          sudo caddy validate --config /etc/caddy/Caddyfile
          sudo -u caddy caddy adapt --config /etc/caddy/Caddyfile > /dev/null
          sudo systemctl reload caddy

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:5088/health > /dev/null; then
              break
            fi

            if [[ "$attempt" == "30" ]]; then
              journalctl -u "$service_name" --no-pager -n 80
              exit 1
            fi

            sleep 1
          done

          sudo find "$root/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' |
            sort -rn |
            tail -n +6 |
            cut -d' ' -f2- |
            sudo xargs -r rm -rf
          REMOTE

      - name: Configure SSH
        shell: bash
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"
          test -n "$VPS_SSH_PORT"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/craftarchitect_vps
          chmod 600 ~/.ssh/craftarchitect_vps
          ssh-keyscan -p "$VPS_SSH_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Create remote temp directory
        id: remote-temp
        shell: bash
        run: |
          remote_tmp="$(ssh -p "$VPS_SSH_PORT" -i ~/.ssh/craftarchitect_vps "$VPS_USER@$VPS_HOST" 'tmp=$(mktemp -d /tmp/marketmafioso-dev.XXXXXX); chmod 700 "$tmp"; printf "%s" "$tmp"')"
          test -n "$remote_tmp"
          echo "path=$remote_tmp" >> "$GITHUB_OUTPUT"

      - name: Upload receiver archive and deploy script
        run: >
          scp -P "$VPS_SSH_PORT"
          -i ~/.ssh/craftarchitect_vps
          "${{ steps.package.outputs.archive }}"
          marketmafioso-dev.env
          marketmafioso-dev.caddy
          deploy-marketmafioso-dev-remote.sh
          "$VPS_USER@$VPS_HOST:${{ steps.remote-temp.outputs.path }}/"

      - name: Activate receiver release
        run: >
          ssh -p "$VPS_SSH_PORT"
          -i ~/.ssh/craftarchitect_vps
          "$VPS_USER@$VPS_HOST"
          "bash '${{ steps.remote-temp.outputs.path }}/deploy-marketmafioso-dev-remote.sh' '${{ steps.package.outputs.release }}' '${{ steps.remote-temp.outputs.path }}'"

      - name: Verify public receiver routes
        shell: bash
        run: |
          curl --fail --silent --show-error "https://dev.xivcraftarchitect.com/api/marketmafioso/health" > /dev/null

          dashboard_status="$(curl --silent --output /dev/null --write-out '%{http_code}' "https://dev.xivcraftarchitect.com/api/marketmafioso/")"
          test "$dashboard_status" = "200"

          dashboard_no_slash_status="$(curl --silent --output /dev/null --write-out '%{http_code}' "https://dev.xivcraftarchitect.com/api/marketmafioso")"
          test "$dashboard_no_slash_status" = "200" || test "$dashboard_no_slash_status" = "308" || test "$dashboard_no_slash_status" = "301"

          curl --fail --silent --show-error \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/" | grep -F "MarketMafioso" > /dev/null
          curl --fail --silent --show-error \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/" | grep -F "_framework/blazor" > /dev/null

          acquisition_page_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/acquisition")"
          test "$acquisition_page_status" = "200"

          api_without_session="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/api/acquisition/requests")"
          test "$api_without_session" = "401"

          cookie_jar="$(mktemp)"
          login_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --cookie-jar "$cookie_jar" \
            --header 'Content-Type: application/json' \
            --data "{\"username\":\"marketmafioso\",\"password\":\"$MARKETMAFIOSO_DEV_BASIC_AUTH_PASSWORD\"}" \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/auth/login")"
          test "$login_status" = "200"

          api_with_session="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --cookie "$cookie_jar" \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/api/acquisition/requests")"
          test "$api_with_session" = "200"

          inventory_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/inventory")"
          test "$inventory_status" = "200"

          inventory_api_without_session="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/api/inventory")"
          test "$inventory_api_without_session" = "401" || test "$inventory_api_without_session" = "405"

          settings_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/settings")"
          test "$settings_status" = "200"

          diagnostics_with_session="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --cookie "$cookie_jar" \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/api/diagnostics/events?limit=1")"
          test "$diagnostics_with_session" = "200"

          acquisition_without_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/acquisition/requests/pending?characterName=Smoke&world=Gilgamesh")"
          test "$acquisition_without_key" = "401"

          acquisition_with_client_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "X-Api-Key: $MARKETMAFIOSO_DEV_INGEST_API_KEY" \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/acquisition/requests/pending?characterName=Smoke&world=Gilgamesh")"
          test "$acquisition_with_client_key" = "200"

          ingest_without_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header 'Content-Type: application/json' \
            --data-binary @docs/samples/inventory-report.sample.json \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/inventory")"
          test "$ingest_without_key" = "401"

          ingest_with_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header "X-Api-Key: $MARKETMAFIOSO_DEV_INGEST_API_KEY" \
            --header 'Content-Type: application/json' \
            --data-binary @docs/samples/inventory-report.sample.json \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/inventory")"
          test "$ingest_with_key" = "201"

          read_with_client_key="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "X-Api-Key: $MARKETMAFIOSO_DEV_INGEST_API_KEY" \
            "https://dev.xivcraftarchitect.com/api/marketmafioso/api/reports")"
          test "$read_with_client_key" = "200"
